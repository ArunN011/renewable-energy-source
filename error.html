<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | Renewable Energy Solution</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Manrope',sans-serif;
}

body,html{
    overflow-x: hidden;
}
body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:
linear-gradient(135deg,#0F766E,#16A34A,#0EA5E9);

position:relative;

}


body::before{

content:"";

position:absolute;

width:650px;

height:650px;

border:2px solid rgba(255,255,255,.15);

border-radius:50%;

top:-250px;

left:-200px;

}

body::after{

content:"";

position:absolute;

width:550px;

height:550px;

border:2px solid rgba(255,255,255,.12);

border-radius:50%;

bottom:-220px;

right:-180px;

}


.float{

position:absolute;

font-size:45px;

color:rgba(255,255,255,.25);

animation:float 6s ease-in-out infinite;

}

.sun{

top:10%;

left:10%;

}

.wind{

bottom:12%;

left:12%;

animation-delay:2s;

}

.bolt{

right:12%;

top:15%;

animation-delay:1s;

}

.leaf{

right:10%;

bottom:15%;

animation-delay:3s;

}

@keyframes float{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-20px);
}

}


.error-card{

max-width:750px;

width:95%;

padding:60px 40px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(18px);

border-radius:30px;

text-align:center;

border:1px solid rgba(255,255,255,.15);

box-shadow:0 25px 60px rgba(0,0,0,.25);

position:relative;

z-index:10;

}

.error-card h1{

font-size:140px;

font-weight:800;

line-height:1;

color:#fff;

text-shadow:0 10px 30px rgba(0,0,0,.2);

}

.error-card h2{

font-size:38px;

font-weight:700;

color:#fff;

margin:20px 0;

}

.error-card p{

font-size:18px;

line-height:1.8;

color:#eefdf5;

max-width:580px;

margin:auto;

}


.btn-group-custom{

margin-top:40px;

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.btn-home{

background:#fff;

color:#16A34A;

padding:14px 32px;

border-radius:50px;

font-weight:700;

text-decoration:none;

transition:.35s;

}

.btn-home:hover{

background:#16A34A;

color:#fff;

transform:translateY(-5px);

}

.btn-back{

background:transparent;

border:2px solid #fff;

color:#fff;

padding:14px 32px;

border-radius:50px;

font-weight:700;

transition:.35s;

}

.btn-back:hover{

background:#fff;

color:#16A34A;

transform:translateY(-5px);

}



@media(max-width:768px){

.error-card{

padding:40px 25px;

}

.error-card h1{

font-size:90px;

}

.error-card h2{

font-size:28px;

}

.error-card p{

font-size:16px;

}

}

@media(max-width:576px){

.error-card h1{

font-size:70px;

}

.error-card h2{

font-size:22px;

}

.btn-home,

.btn-back{

width:100%;

}

}

</style>

</head>

<body>

<i class="bi bi-sun-fill float sun"></i>

<i class="bi bi-wind float wind"></i>

<i class="bi bi-lightning-charge-fill float bolt"></i>

<i class="bi bi-leaf-fill float leaf"></i>

<div class="error-card">

<h1 id="error-number">404</h1>

<h2>Oops! Page Not Found</h2>

<p>

The renewable energy page you're looking for doesn't exist or has been moved.
Let's get you back to exploring clean, sustainable energy solutions.

</p>

<div class="btn-group-custom">

<a href="index.html" class="btn-home">

<i class="bi bi-house-door-fill"></i>

&nbsp; Back To Home

</a>

<button class="btn btn-back" onclick="history.back()">

<i class="bi bi-arrow-left-circle-fill"></i>

&nbsp; Go Back

</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>

// 404 animation

const number=document.getElementById("error-number");

setInterval(()=>{

number.style.transform="scale(1.08)";

setTimeout(()=>{

number.style.transform="scale(1)";

},300);

},1800);

</script>

</body>

</html>
