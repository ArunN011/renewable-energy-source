<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Renewable Energy Solution</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="login.css">

</head>

<body>

    <section class="login-section">

        <div class="container">

            <div class="row align-items-center login-wrapper">

             

                <div class="col-lg-6 d-none d-lg-block">

                    <div class="login-left">

                        <img src="loginsolar.webp"
                            class="img-fluid login-img"
                            alt="Renewable Energy">

                        <div class="login-content">

                            <span class="login-badge">

                                <i class="bi bi-lightning-charge-fill"></i>

                                Renewable Energy

                            </span>

                            <h1>

                                Powering A

                                <span>Greener Future</span>

                            </h1>

                            <p>

                                Securely access your renewable energy dashboard
                                to monitor projects, track energy savings,
                                and manage your sustainable solutions.

                            </p>

                        </div>

                    </div>

                </div>

               
                <div class="col-lg-6">

                    <div class="login-card">

                        <div class="text-center mb-4">

                            <img src="finalgreenlogo.png"
                                class="login-logo"
                                alt="Logo">

                            <h2>

                                Welcome Back

                            </h2>

                            <p>

                                Login to continue your green journey

                            </p>

                        </div>

                        <form id="loginForm">

                  

                            <div class="mb-3">

                                <label class="form-label">

                                    Login As

                                </label>

                                <select
                                    class="form-select"
                                    id="role">

                                    <option value="">Select Role</option>

                                    <option value="admin">

                                        Admin

                                    </option>

                                    <option value="user">

                                        User

                                    </option>

                                </select>

                            </div>

                     

                            <div class="mb-3">

                                <label class="form-label">

                                    Full Name

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="username"
                                    placeholder="Enter your full name">

                            </div>


                            <div class="mb-3">

                                <label class="form-label">

                                    Password

                                </label>

                                <div class="password-box">

                                    <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                        placeholder="Enter your password">

                                    <i class="bi bi-eye-slash-fill toggle-password"
                                        id="togglePassword"></i>

                                </div>

                            </div>

                      

                            <div
                                class="d-flex justify-content-between align-items-center mb-4">

                                <div class="form-check">

                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        id="remember" required>

                                    <label
                                        class="form-check-label">

                                        Remember Me

                                    </label>

                                </div>

                                <a href="error.html"
                                    class="forgot-link">

                                    Forgot Password?

                                </a>

                            </div>

                   

                            <button
                                type="submit"
                                class="btn login-btn">

                                <i class="bi bi-box-arrow-in-right"></i>

                                Login

                            </button>

                  

                            <a
                                href="index.html"
                                class="btn home-btn">

                                <i class="bi bi-house-door-fill"></i>

                                Back To Home

                            </a>

                            <div class="signup-text">

                                Don't have an account?

                                <a href="register.html">

                                    Sign Up

                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script >
        document.addEventListener("DOMContentLoaded", () => {

    const loginForm = document.getElementById("loginForm");
    const password = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");


    togglePassword.addEventListener("click", () => {

        const type = password.getAttribute("type") === "password"
            ? "text"
            : "password";

        password.setAttribute("type", type);

        togglePassword.classList.toggle("bi-eye-fill");
        togglePassword.classList.toggle("bi-eye-slash-fill");

    });


    loginForm.addEventListener("submit", function (e) {

        e.preventDefault();

        const role = document.getElementById("role").value;

        const username = document
            .getElementById("username")
            .value
            .trim();

        const passwordValue = password.value.trim();



        if (
            role === "" ||
            username === "" ||
            passwordValue === ""
        ) {

            Swal.fire({

                icon: "warning",

                title: "Incomplete Form",

                text: "Please fill in all fields.",

                confirmButtonColor: "#16A34A"

            });

            return;

        }

   

        const btn = document.querySelector(".login-btn");

        btn.disabled = true;

        btn.innerHTML = `
            <span class="spinner-border spinner-border-sm"></span>
            Logging In...
        `;


        localStorage.setItem("userName", username);

        localStorage.setItem("userRole", role);


        setTimeout(() => {

            Swal.fire({

                icon: "success",

                title: "Login Successful",

                text: "Welcome " + username,

                confirmButtonColor: "#16A34A",

                allowOutsideClick: false

            }).then(() => {

                if (role === "admin") {

                    window.location.href =
                        "admin-dashboard.html";

                }

                else {

                    window.location.href =
                        "user-dashboard.html";

                }

            });

        },1000);

    });


    document.querySelectorAll(

        ".form-control,.form-select"

    ).forEach(input => {

        input.addEventListener("focus", function () {

            this.style.transform = "scale(1.02)";

        });

        input.addEventListener("blur", function () {

            this.style.transform = "scale(1)";

        });

    });

  

    const loginBtn = document.querySelector(".login-btn");

    loginBtn.addEventListener("mouseenter", () => {

        loginBtn.style.transform = "translateY(-5px)";

    });

    loginBtn.addEventListener("mouseleave", () => {

        loginBtn.style.transform = "translateY(0)";

    });

});


window.addEventListener("pageshow", () => {

    const form = document.getElementById("loginForm");

    const btn = document.querySelector(".login-btn");

    if(form){

        form.reset();

    }

    if(btn){

        btn.disabled = false;

        btn.innerHTML = `

            <i class="bi bi-box-arrow-in-right"></i>

            Login

        `;

    }

});
    </script>

</body>

</html>
